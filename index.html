<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Xorame — Neofetch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* фон с картинкой и размытием */
        body {
            min-height: 100vh;
            background: #000;
            font-family: 'Share Tech Mono', 'Fira Code', 'Cascadia Code', monospace;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(12px);
            opacity: 0.4;
            z-index: -2;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        /* терминал на весь экран */
        .terminal {
            width: 100vw;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.82);
            border-left: 4px solid #aa66ff;
            border-right: 4px solid #aa66ff;
            color: #0f0;
            padding: 2rem 3rem;
            font-family: inherit;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 700px) {
            .terminal {
                padding: 1.5rem;
            }
        }

        /* командная строка */
        .command-line {
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-size: 1.6rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .prompt {
            color: #0f0;
            font-weight: bold;
            font-size: 1.6rem;
        }
        .command {
            font-size: 1.6rem;
            letter-spacing: 1px;
        }
        .cursor-blink {
            display: inline-block;
            width: 12px;
            height: 1.6rem;
            background-color: #0f0;
            vertical-align: middle;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ascii-арт блоки (гибкие) */
        .ascii-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 30px;
            margin: 20px 0 30px 0;
        }
        .ascii-block {
            font-family: monospace;
            white-space: pre;
            line-height: 1.2;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 12px;
            overflow-x: auto;
        }
        @media (max-width: 800px) {
            .ascii-block {
                font-size: 8px;
                padding: 5px;
            }
        }

        /* вывод информации */
        .output-lines {
            margin-top: 20px;
        }
        .info-line {
            font-family: monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .contact-highlight {
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: 0.1s;
        }
        .contact-highlight:hover {
            text-shadow: 0 0 5px #0f0;
        }
        .glitch-text {
            display: inline-block;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1rem;
            z-index: 1000;
            backdrop-filter: blur(8px);
            pointer-events: none;
            transition: opacity 0.2s;
        }
        hr {
            border-color: #2a6e2a;
            margin: 15px 0;
        }
        .footer-cursor {
            display: inline-block;
            width: 12px;
            height: 1.4rem;
            background-color: #0f0;
            vertical-align: middle;
            margin-left: 8px;
            animation: blink 1s step-end infinite;
        }
        /* футуристичный акцент */
        .neon-text {
            text-shadow: 0 0 2px #0f0;
        }
    </style>
</head>
<body>
<div class="terminal">
    <!-- строка с командой -->
    <div class="command-line">
        <span class="prompt">$</span>
        <span class="command" id="typedCommand"></span>
        <span class="cursor-blink" id="cmdCursor"></span>
    </div>

    <!-- ascii-арт -->
    <div id="asciiContainer" style="display: none;">
        <div class="ascii-row">
            <div class="ascii-block" id="aphexAscii"></div>
            <div class="ascii-block" id="thinkpadAscii"></div>
        </div>
    </div>

    <!-- neofetch вывод -->
    <div id="neofetchOutput" class="output-lines"></div>

    <!-- мигающий курсор в конце -->
    <div style="margin-top: 25px;">
        <span class="prompt">$</span> <span style="visibility: hidden;">_</span><span class="footer-cursor"></span>
    </div>
</div>

<script>
    // ---------- ASCII ART ----------
    const aphexArt = `                                     oMMMMo                           
               ‘MMMMM.         MMMMM’                   
            WMM,                    ,MMM                
         dMM                            MMx              
       kMx                                xMk            
     ,M0                                    0M;          
    xM,   KMMMMMMMMMMMMMMMMMMMMMM:           ‘Mk         
   kM.   lMMMMMMMMMMMMMMMMMMMMMMMMO           .MO        
  oM’     0MMMMMMMMMl   MMMMMMMMMMMc           .Mo       
 .Md                  .MMMMMMMMMMMMM.           oM.      
 dM                  ,MMMMX dMMMMMMMW            Mx       
 XK                 cMMMMM    MMMMMMMk           KX       
 WO                YOU    KMMMMMM:          OW       
 XK               GREAT      oMMMMMM.         KX       
 dM.             TWAT           ,MMMMMX         Mx       
 .Md            YOU               MMMMMx       oM.       
  oM’          0MM;                 0MMMM;     .Mo       
   kM.                               lMMMM    .MO        
    xM,                               ‘MMMc  ,Mk         
     ,MK                                    0M,          
       xMk                                xMk            
         dMM                            MMd              
            WMM;                    ;MMW                 
               .MMMMM.        .MMMMM.                    
                       ‘MMMM’`;

    const thinkpadArt = `+-----------------------------------+
|             ThinkPad                |
|   +-----------------------------+   |
|   |                             |   |
|   |       [    экран    ]        |   |
|   |                             |   |
|   +-----------------------------+   |
|   |   [  клавиатура ]   [трекпоинт]|
|   +-----------------------------+   |
|   |     oooo        oooo          |   |
|   +-----------------------------------+`;

    // ---------- РАСШИРЕННАЯ ИНФОРМАЦИЯ (больше строк) ----------
    const fields = [
        { label: "User:", value: "Xorame (Dmitriy)" },
        { label: "OS:", value: "HumanOS 1.0 (Krasnoyarsk)" },
        { label: "Shell:", value: "zsh 5.8" },
        { label: "Uptime:", value: "17 years (no reboot)" },
        { label: "Hobby:", value: "аудиофил, C++ программирование, ремонт электроники" },
        { label: "Music:", value: "Ryuichi Sakamoto, Tunng, The Books, Aphex Twin, Autechre, Rammstein, SOAD, Pink Floyd" },
        { label: "Games:", value: "Black Desert, Factorio, Portal 2, Terraria" },
        { label: "Motto:", value: "если можно сломать — можно починить" },
        { label: "Status:", value: "junior+ ремонтник" },
        { label: "Editor:", value: "vim" },
        { label: "Cat:", value: "Sonya (🐱)" },
        { label: "Personal life:", value: "[ERROR] segmentation fault" },
        { label: "Age:", value: "17 years" }
    ];

    const contacts = [
        { label: "Telegram:", value: "@xoramegods", copyValue: "@xoramegods" },
        { label: "Email:", value: "xorame.x.x@gmail.com", copyValue: "xorame.x.x@gmail.com" }
    ];

    // ---------- УТИЛИТЫ ----------
    function randomChar() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+{}[]|:;<>?,./~`";
        return chars[Math.floor(Math.random() * chars.length)];
    }

    function generateGlitchedString(target) {
        let glitched = "";
        for (let i = 0; i < target.length; i++) {
            glitched += randomChar();
        }
        return glitched;
    }

    // быстрая анимация исправления (все символы меняются за ~300-500 мс)
    function animateFixFast(element, target, callback) {
        const len = target.length;
        let current = generateGlitchedString(target);
        element.textContent = current;
        const indices = Array.from({ length: len }, (_, i) => i);
        // перемешиваем
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        let step = 0;
        function fixStep() {
            if (step >= indices.length) {
                if (callback) callback();
                return;
            }
            const pos = indices[step];
            let arr = current.split('');
            arr[pos] = target[pos];
            current = arr.join('');
            element.textContent = current;
            step++;
            // очень быстрая коррекция: 15-25 мс на символ
            setTimeout(fixStep, Math.random() * 20 + 10);
        }
        fixStep();
    }

    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        const div = document.createElement('div');
        div.className = 'toast';
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => {
            div.style.opacity = '0';
            setTimeout(() => div.remove(), 300);
        }, 1500);
    }

    // добавить строку с быстрым исправлением
    function addInfoLineFast(label, value, isContact = false, copyValue = null) {
        return new Promise((resolve) => {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'info-line';
            const labelSpan = document.createElement('span');
            labelSpan.textContent = label + " ";
            labelSpan.style.fontWeight = 'bold';
            lineDiv.appendChild(labelSpan);

            const valueSpan = document.createElement('span');
            valueSpan.className = 'glitch-text';
            lineDiv.appendChild(valueSpan);
            document.getElementById('neofetchOutput').appendChild(lineDiv);

            animateFixFast(valueSpan, value, () => {
                if (isContact && copyValue) {
                    valueSpan.style.fontWeight = 'bold';
                    valueSpan.style.cursor = 'pointer';
                    valueSpan.style.textDecoration = 'underline';
                    valueSpan.title = 'Кликни — скопирую';
                    valueSpan.classList.add('contact-highlight');
                    valueSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        navigator.clipboard.writeText(copyValue).then(() => {
                            showToast(`Скопировано: ${copyValue}`);
                        }).catch(() => showToast('Не удалось скопировать'));
                    });
                }
                resolve();
            });
        });
    }

    // быстрая печать команды (2 секунды)
    function typeCommandFast() {
        return new Promise((resolve) => {
            const cmdElement = document.getElementById('typedCommand');
            const cmdText = "sudo neofetch";
            let i = 0;
            function typeNext() {
                if (i < cmdText.length) {
                    cmdElement.textContent += cmdText.charAt(i);
                    i++;
                    setTimeout(typeNext, 45); // ~0.5 сек на всю команду
                } else {
                    document.getElementById('cmdCursor').style.display = 'none';
                    setTimeout(resolve, 100);
                }
            }
            typeNext();
        });
    }

    function showAscii() {
        const container = document.getElementById('asciiContainer');
        document.getElementById('aphexAscii').textContent = aphexArt;
        document.getElementById('thinkpadAscii').textContent = thinkpadArt;
        container.style.display = 'block';
        return Promise.resolve();
    }

    // запуск
    async function runNeofetch() {
        await typeCommandFast();
        await showAscii();

        // выводим все строки почти одновременно (но с микрозадержкой, чтобы успевали исправляться)
        const promises = [];
        for (let i = 0; i < fields.length; i++) {
            promises.push(addInfoLineFast(fields[i].label, fields[i].value, false, null));
            await new Promise(r => setTimeout(r, 30)); // маленькая пауза для визуального порядка
        }
        await Promise.all(promises);

        // разделитель
        const hr = document.createElement('hr');
        document.getElementById('neofetchOutput').appendChild(hr);
        await new Promise(r => setTimeout(r, 50));

        for (let i = 0; i < contacts.length; i++) {
            await addInfoLineFast(contacts[i].label, contacts[i].value, true, contacts[i].copyValue);
            await new Promise(r => setTimeout(r, 30));
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        runNeofetch().catch(console.error);
    });
</script>
</body>
</html>
