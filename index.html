<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Xorame --- Neofetch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            padding: 20px;
        }

        /* терминальный контейнер с фиолетовой рамкой */
        .terminal {
            max-width: 1300px;
            width: 100%;
            background: #000000;
            border: 2px solid #aa66ff;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(170, 102, 255, 0.3);
            padding: 20px 24px 30px 24px;
            transition: all 0.2s;
        }

        /* зелёный текст */
        .terminal, .terminal * {
            color: #0f0;
        }

        /* командная строка */
        .command-line {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .prompt {
            color: #0f0;
            font-weight: bold;
        }
        .command {
            color: #0f0;
            letter-spacing: 1px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #0f0;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ascii-art блоки */
        .ascii-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
            margin: 20px 0 30px 0;
        }
        .ascii-block {
            background: #000;
            font-family: monospace;
            white-space: pre;
            line-height: 1.2;
            font-size: 14px;
            overflow-x: auto;
        }
        @media (max-width: 800px) {
            .ascii-block {
                font-size: 8px;
            }
            .terminal {
                padding: 12px;
            }
        }
        /* блок вывода информации */
        .output-lines {
            margin-top: 20px;
        }
        .info-line {
            font-family: monospace;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .contact-highlight {
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: opacity 0.2s;
        }
        .contact-highlight:hover {
            opacity: 0.8;
        }
        .glitch-text {
            display: inline-block;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 18px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.9rem;
            z-index: 999;
            backdrop-filter: blur(4px);
            pointer-events: none;
            transition: opacity 0.2s;
        }
        hr {
            border-color: #2a2a2a;
            margin: 12px 0;
        }
        .footer-cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #0f0;
            vertical-align: middle;
            margin-left: 6px;
            animation: blink 1s step-end infinite;
        }
    </style>
</head>
<body>
<div class="terminal">
    <!-- строка с командой (анимированная) -->
    <div class="command-line">
        <span class="prompt">$</span>
        <span class="command" id="typedCommand"></span>
        <span class="cursor" id="cmdCursor"></span>
    </div>

    <!-- ascii-арт блоки (появятся после команды) -->
    <div id="asciiContainer" style="display: none;">
        <div class="ascii-row">
            <div class="ascii-block" id="aphexAscii"></div>
            <div class="ascii-block" id="thinkpadAscii"></div>
        </div>
    </div>

    <!-- контейнер для построчного вывода neofetch -->
    <div id="neofetchOutput" class="output-lines"></div>

    <!-- мигающий курсор в конце -->
    <div style="margin-top: 20px;">
        <span class="prompt">$</span> <span style="visibility: hidden;">_</span><span class="footer-cursor"></span>
    </div>
</div>

<script>
    // ---------- ASCII ART ----------
    const aphexArt = `                                     oMMMMo                           
               ‘MMMMM.         MMMMM’                   
            WMM,                    ,MMM                
         dMM                            MMx              
       kMx                                xMk            
     ,M0                                    0M;          
    xM,   KMMMMMMMMMMMMMMMMMMMMMM:           ‘Mk         
   kM.   lMMMMMMMMMMMMMMMMMMMMMMMMO           .MO        
  oM’     0MMMMMMMMMl   MMMMMMMMMMMc           .Mo       
 .Md                  .MMMMMMMMMMMMM.           oM.      
 dM                  ,MMMMX dMMMMMMMW            Mx       
 XK                 cMMMMM    MMMMMMMk           KX       
 WO                YOU    KMMMMMM:          OW       
 XK               GREAT      oMMMMMM.         KX       
 dM.             TWAT           ,MMMMMX         Mx       
 .Md            YOU               MMMMMx       oM.       
  oM’          0MM;                 0MMMM;     .Mo       
   kM.                               lMMMM    .MO        
    xM,                               ‘MMMc  ,Mk         
     ,MK                                    0M,          
       xMk                                xMk            
         dMM                            MMd              
            WMM;                    ;MMW                 
               .MMMMM.        .MMMMM.                    
                       ‘MMMM’`;

    // простой ascii ThinkPad (высота подогнана под aphex)
    const thinkpadArt = `+-----------------------------------+
|             ThinkPad                |
|   +-----------------------------+   |
|   |                             |   |
|   |       [    экран    ]        |   |
|   |                             |   |
|   +-----------------------------+   |
|   |   [  клавиатура ]   [трекпоинт]|
|   +-----------------------------+   |
|   |     oooo        oooo          |   |
|   +-----------------------------------+`;

    // ---------- ДАННЫЕ ДЛЯ NEOFETCH (целевые строки) ----------
    const fields = [
        { label: "User:", value: "Xorame (Dmitriy)" },
        { label: "OS:", value: "Human v1.0 (Krasnoyarsk)" },
        { label: "Hobby:", value: "аудиофил, программирование C++, ремонт" },
        { label: "Music:", value: "Ryuichi Sakamoto, Tunng, The Books, Aphex Twin, Autechre, Rammstein, SOAD, Pink Floyd" },
        { label: "Games:", value: "Black Desert, Factorio, Portal 2, Terraria" },
        { label: "Status:", value: "junior+ ремонтник" },
        { label: "Editor:", value: "vim" },
        { label: "Cat:", value: "Sonya" },
        { label: "Personal life:", value: "[ERROR]" },
        { label: "Age:", value: "17 years" }
    ];

    // контакты (отдельно, с возможностью копирования)
    const contacts = [
        { label: "Telegram:", value: "@xoramegods", copyValue: "@xoramegods" },
        { label: "Email:", value: "xorame.x.x@gmail.com", copyValue: "xorame.x.x@gmail.com" }
    ];

    // ---------- УТИЛИТЫ ----------
    function randomChar() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+{}[]|:;<>?,./~`";
        return chars[Math.floor(Math.random() * chars.length)];
    }

    // генерирует строку с ошибками (случайные символы) нужной длины
    function generateGlitchedString(target) {
        let glitched = "";
        for (let i = 0; i < target.length; i++) {
            glitched += randomChar();
        }
        return glitched;
    }

    // анимация исправления: элемент span, конечный текст target, скорость исправления
    function animateFix(element, target, callback) {
        const len = target.length;
        let current = generateGlitchedString(target);
        element.textContent = current;
        const indices = Array.from({ length: len }, (_, i) => i);
        // перемешаем индексы для случайного порядка исправления
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        let step = 0;
        function fixStep() {
            if (step >= indices.length) {
                if (callback) callback();
                return;
            }
            const pos = indices[step];
            // заменяем символ на правильный
            let arr = current.split('');
            arr[pos] = target[pos];
            current = arr.join('');
            element.textContent = current;
            step++;
            // случайная задержка для реалистичности (30–80 мс)
            setTimeout(fixStep, Math.random() * 50 + 30);
        }
        fixStep();
    }

    // показать уведомление о копировании
    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        const div = document.createElement('div');
        div.className = 'toast';
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => {
            div.style.opacity = '0';
            setTimeout(() => div.remove(), 300);
        }, 1800);
    }

    // добавить строку в neofetchOutput с анимацией
    function addInfoLine(label, value, isContact = false, copyValue = null) {
        return new Promise((resolve) => {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'info-line';
            const labelSpan = document.createElement('span');
            labelSpan.textContent = label + " ";
            labelSpan.style.fontWeight = 'bold';
            lineDiv.appendChild(labelSpan);

            const valueSpan = document.createElement('span');
            valueSpan.className = 'glitch-text';
            lineDiv.appendChild(valueSpan);
            document.getElementById('neofetchOutput').appendChild(lineDiv);

            // анимируем исправление текста
            animateFix(valueSpan, value, () => {
                if (isContact && copyValue) {
                    // делаем текст жирным и кликабельным для копирования
                    valueSpan.style.fontWeight = 'bold';
                    valueSpan.style.cursor = 'pointer';
                    valueSpan.style.textDecoration = 'underline';
                    valueSpan.title = 'Нажми, чтобы скопировать';
                    valueSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        navigator.clipboard.writeText(copyValue).then(() => {
                            showToast(`Скопировано: ${copyValue}`);
                        }).catch(() => showToast('Ошибка копирования'));
                    });
                }
                resolve();
            });
        });
    }

    // анимация печати команды "sudo neofetch"
    function typeCommand() {
        return new Promise((resolve) => {
            const cmdElement = document.getElementById('typedCommand');
            const cmdText = "sudo neofetch";
            let i = 0;
            function typeNext() {
                if (i < cmdText.length) {
                    cmdElement.textContent += cmdText.charAt(i);
                    i++;
                    setTimeout(typeNext, 70);
                } else {
                    // прячем курсор после команды
                    document.getElementById('cmdCursor').style.display = 'none';
                    setTimeout(resolve, 300);
                }
            }
            typeNext();
        });
    }

    // показать ascii-art
    function showAscii() {
        const container = document.getElementById('asciiContainer');
        const aphexPre = document.getElementById('aphexAscii');
        const thinkPre = document.getElementById('thinkpadAscii');
        aphexPre.textContent = aphexArt;
        thinkPre.textContent = thinkpadArt;
        container.style.display = 'block';
        // маленькая задержка для плавности
        return new Promise(r => setTimeout(r, 200));
    }

    // главный запуск
    async function runNeofetch() {
        await typeCommand();
        await showAscii();

        // выводим поля по очереди
        for (let i = 0; i < fields.length; i++) {
            const f = fields[i];
            await addInfoLine(f.label, f.value, false, null);
            // небольшая пауза между строками
            await new Promise(r => setTimeout(r, 120));
        }

        // разделитель
        const hr = document.createElement('hr');
        document.getElementById('neofetchOutput').appendChild(hr);
        await new Promise(r => setTimeout(r, 100));

        // выводим контакты с возможностью копирования
        for (let i = 0; i < contacts.length; i++) {
            const c = contacts[i];
            await addInfoLine(c.label, c.value, true, c.copyValue);
            await new Promise(r => setTimeout(r, 100));
        }
    }

    // запускаем всё после загрузки страницы
    window.addEventListener('DOMContentLoaded', () => {
        runNeofetch().catch(console.error);
    });
</script>
</body>
</html>
